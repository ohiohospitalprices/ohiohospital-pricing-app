<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Pricing Compare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066cc;
            --primary-light: #e6f2ff;
            --primary-dark: #004a99;
            --success: #28a745;
            --border: #ddd;
            --border-dark: #999;
            --text: #333;
            --text-light: #666;
            --bg: #f9fafb;
            --white: #fff;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.15);
            --radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: var(--primary-dark);
        }

        .subtitle {
            color: var(--text-light);
            font-size: 16px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 14px;
        }

        .search-container {
            position: relative;
        }

        input[type="text"],
        select {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 var(--radius) var(--radius);
            max-height: 300px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            box-shadow: var(--shadow);
        }

        .autocomplete-dropdown.active {
            display: block;
        }

        .autocomplete-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: background-color 0.15s;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover {
            background-color: var(--primary-light);
            color: var(--primary-dark);
        }

        .autocomplete-item.selected {
            background-color: var(--primary-light);
            color: var(--primary-dark);
            font-weight: 600;
        }

        .loading {
            display: none;
            padding: 8px 12px;
            color: var(--text-light);
            font-size: 13px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            display: none;
            padding: 12px 16px;
            background: #fee;
            border: 1px solid #fcc;
            border-radius: var(--radius);
            color: #c33;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .error.active {
            display: block;
        }

        .results {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
            display: none;
        }

        .results.active {
            display: block;
        }

        .result-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .procedure-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        .procedure-meta {
            color: var(--text-light);
            font-size: 14px;
        }

        .selected-hospital {
            background: var(--primary-light);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            border-left: 4px solid var(--primary);
        }

        .hospital-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        .price-display {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin: 12px 0;
        }

        .price-label {
            color: var(--text-light);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .comparison-section {
            margin-top: 30px;
        }

        .comparison-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: var(--bg);
            border-bottom: 2px solid var(--border);
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: var(--bg);
        }

        .price-cell {
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 15px;
        }

        .lowest-price {
            background: #efe;
            color: var(--success);
            font-weight: 700;
        }

        .highest-price {
            background: #fee;
            color: #c33;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state h2 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
            }

            .controls {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .results {
                padding: 20px;
            }

            .procedure-name {
                font-size: 20px;
            }

            .price-display {
                font-size: 24px;
            }

            .selected-hospital {
                padding: 16px;
            }

            th, td {
                padding: 10px 12px;
                font-size: 13px;
            }

            .hospital-name {
                font-size: 16px;
            }

            .result-header {
                margin-bottom: 20px;
                padding-bottom: 16px;
            }

            .comparison-section {
                margin-top: 20px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            h1 {
                font-size: 20px;
            }

            .procedure-name {
                font-size: 18px;
            }

            .price-display {
                font-size: 20px;
            }

            th, td {
                padding: 8px;
                font-size: 12px;
            }

            .autocomplete-dropdown {
                max-height: 200px;
            }

            .selected-hospital {
                padding: 12px;
            }

            .table-wrapper {
                font-size: 12px;
            }
        }

        .no-data {
            text-align: center;
            padding: 20px;
            color: var(--text-light);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Hospital Pricing Compare</h1>
            <p class="subtitle">Search procedures and compare prices across hospitals</p>
        </header>

        <div class="error" id="error"></div>

        <div class="controls">
            <div class="form-group">
                <label for="procedureSearch">Search Procedure</label>
                <div class="search-container">
                    <input 
                        type="text" 
                        id="procedureSearch" 
                        placeholder="e.g., MRI, Knee Surgery, Blood Test..."
                        autocomplete="off"
                    >
                    <div class="loading" id="searchLoading">
                        <span class="spinner"></span>Searching...
                    </div>
                    <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="hospitalSelect">Select Hospital</label>
                <select id="hospitalSelect">
                    <option value="">Choose a hospital...</option>
                </select>
            </div>
        </div>

        <div class="results" id="results">
            <div id="resultsContent"></div>
        </div>

        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">🔍</div>
            <h2>Start Your Search</h2>
            <p>Enter a procedure name above to see hospital prices</p>
        </div>
    </div>

    <script>
        // State
        let state = {
            selectedProcedure: null,
            selectedHospital: null,
            currentSearch: '',
            debounceTimer: null,
            searchResults: [],
            hospitals: [],
            priceData: null
        };

        // DOM Elements
        const elements = {
            procedureSearch: document.getElementById('procedureSearch'),
            hospitalSelect: document.getElementById('hospitalSelect'),
            autocompleteDropdown: document.getElementById('autocompleteDropdown'),
            searchLoading: document.getElementById('searchLoading'),
            results: document.getElementById('results'),
            resultsContent: document.getElementById('resultsContent'),
            emptyState: document.getElementById('emptyState'),
            error: document.getElementById('error')
        };

        // Initialize
        async function init() {
            await loadHospitals();
            setupEventListeners();
        }

        function setupEventListeners() {
            elements.procedureSearch.addEventListener('input', handleProcedureInput);
            elements.procedureSearch.addEventListener('blur', () => {
                setTimeout(() => hideAutocomplete(), 200);
            });
            elements.hospitalSelect.addEventListener('change', handleHospitalSelect);
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    hideAutocomplete();
                }
            });
        }

        function handleProcedureInput(e) {
            const value = e.target.value.trim();
            state.currentSearch = value;

            // Clear previous timer
            clearTimeout(state.debounceTimer);
            elements.searchLoading.classList.remove('active');

            if (value.length < 2) {
                hideAutocomplete();
                resetResults();
                return;
            }

            // Debounce search (300ms)
            elements.searchLoading.classList.add('active');
            state.debounceTimer = setTimeout(() => {
                searchProcedures(value);
            }, 300);
        }

        async function searchProcedures(query) {
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                if (!response.ok) throw new Error('Search failed');

                state.searchResults = await response.json();
                elements.searchLoading.classList.remove('active');

                if (state.searchResults.length === 0) {
                    hideAutocomplete();
                    return;
                }

                populateAutocomplete(state.searchResults);
            } catch (err) {
                showError('Failed to search procedures. Please try again.');
                elements.searchLoading.classList.remove('active');
                console.error(err);
            }
        }

        function populateAutocomplete(results) {
            const dropdown = elements.autocompleteDropdown;
            dropdown.innerHTML = '';

            results.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                if (state.selectedProcedure && state.selectedProcedure.id === item.id) {
                    div.classList.add('selected');
                }
                div.textContent = item.name;
                div.addEventListener('click', () => selectProcedure(item));
                dropdown.appendChild(div);
            });

            showAutocomplete();
        }

        function selectProcedure(procedure) {
            state.selectedProcedure = procedure;
            elements.procedureSearch.value = procedure.name;
            hideAutocomplete();
            fetchPrices();
        }

        function handleHospitalSelect(e) {
            const hospitalId = e.target.value;
            if (!hospitalId) {
                state.selectedHospital = null;
                resetResults();
                return;
            }

            state.selectedHospital = state.hospitals.find(h => h.id === hospitalId);
            if (state.priceData) {
                displayResults();
            }
        }

        async function loadHospitals() {
            try {
                const response = await fetch('/api/hospitals');
                if (!response.ok) throw new Error('Failed to load hospitals');

                state.hospitals = await response.json();
                populateHospitalDropdown();
            } catch (err) {
                showError('Failed to load hospitals. Please refresh the page.');
                console.error(err);
            }
        }

        function populateHospitalDropdown() {
            const select = elements.hospitalSelect;
            select.innerHTML = '<option value="">Choose a hospital...</option>';

            state.hospitals.forEach(hospital => {
                const option = document.createElement('option');
                option.value = hospital.id;
                option.textContent = hospital.name;
                select.appendChild(option);
            });
        }

        async function fetchPrices() {
            if (!state.selectedProcedure) return;

            try {
                showLoading();
                const response = await fetch(
                    `/api/prices?procedureId=${state.selectedProcedure.id}`
                );
                if (!response.ok) throw new Error('Failed to fetch prices');

                state.priceData = await response.json();
                
                // Reset hospital selection
                if (state.selectedHospital) {
                    displayResults();
                } else {
                    resetResults();
                }
            } catch (err) {
                showError('Failed to fetch pricing data. Please try again.');
                console.error(err);
            }
        }

        function displayResults() {
            if (!state.priceData || !state.selectedHospital) {
                resetResults();
                return;
            }

            const procedure = state.selectedProcedure;
            const hospital = state.selectedHospital;
            const prices = state.priceData.prices || [];
            const selectedPrice = prices.find(p => p.hospitalId === hospital.id);

            if (!selectedPrice) {
                showError('No pricing data available for this hospital and procedure.');
                return;
            }

            // Sort prices
            const sortedPrices = [...prices].sort((a, b) => a.price - b.price);
            const minPrice = sortedPrices[0].price;
            const maxPrice = sortedPrices[sortedPrices.length - 1].price;

            let html = `
                <div class="result-header">
                    <div class="procedure-name">${escapeHtml(procedure.name)}</div>
                    <div class="procedure-meta">
                        Available at ${prices.length} hospital${prices.length !== 1 ? 's' : ''}
                    </div>
                </div>

                <div class="selected-hospital">
                    <div class="price-label">Your Selected Hospital</div>
                    <div class="hospital-name">${escapeHtml(hospital.name)}</div>
                    <div class="price-display">$${formatPrice(selectedPrice.price)}</div>
                </div>

                <div class="comparison-section">
                    <div class="comparison-title">Price Comparison (All Hospitals)</div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Hospital</th>
                                    <th>Price</th>
                                    <th>Difference</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            sortedPrices.forEach(p => {
                const hospital = state.hospitals.find(h => h.id === p.hospitalId);
                const isLowest = p.price === minPrice;
                const isHighest = p.price === maxPrice;
                const difference = p.price - selectedPrice.price;
                const diffPercent = ((difference / selectedPrice.price) * 100).toFixed(1);
                const diffText = difference > 0 ? `+$${formatPrice(difference)} (+${diffPercent}%)` 
                                : difference < 0 ? `-$${formatPrice(Math.abs(difference))} (${diffPercent}%)`
                                : 'Same';

                let priceClass = '';
                if (isLowest) priceClass = 'lowest-price';
                else if (isHighest) priceClass = 'highest-price';

                html += `
                    <tr>
                        <td>${escapeHtml(hospital.name)}</td>
                        <td class="price-cell ${priceClass}">$${formatPrice(p.price)}</td>
                        <td>${escapeHtml(diffText)}</td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            elements.resultsContent.innerHTML = html;
            elements.results.classList.add('active');
            elements.emptyState.style.display = 'none';
            clearError();
        }

        function resetResults() {
            elements.results.classList.remove('active');
            elements.emptyState.style.display = 'block';
        }

        function showAutocomplete() {
            elements.autocompleteDropdown.classList.add('active');
        }

        function hideAutocomplete() {
            elements.autocompleteDropdown.classList.remove('active');
        }

        function showLoading() {
            elements.results.classList.remove('active');
            elements.emptyState.style.display = 'none';
        }

        function showError(message) {
            elements.error.textContent = message;
            elements.error.classList.add('active');
        }

        function clearError() {
            elements.error.classList.remove('active');
            elements.error.textContent = '';
        }

        function formatPrice(price) {
            return typeof price === 'number' 
                ? price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                : '0.00';
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Start
        init();
    </script>
</body>
</html>
